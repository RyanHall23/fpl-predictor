services:
  - type: web
    name: fpl-predictor-backend
    runtime: node
    buildCommand: npm ci --omit=dev && npm run build
    startCommand: npm run start-backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: fpl-predictor-db
          property: connectionString

databases:
  - name: fpl-predictor-db
    databaseName: fplpredictor
    plan: free
