version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/" # Location of package.json
    schedule:
      interval: "daily" # or "weekly", "monthly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps"
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
    # Optionally, enable auto-merge for patch/minor updates:
    # (Requires GitHub repo settings to allow auto-merge)
    # allow:
    #   - dependency-type: "all"
